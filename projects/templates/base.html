<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProjectFlow - {% block title %}Home{% endblock %}</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
      }
      nav {
        background: #2c3e50;
        padding: 10px;
        margin-bottom: 20px;
      }
      nav a {
        color: white;
        margin-right: 15px;
        text-decoration: none;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      .messages {
        list-style: none;
        padding: 0;
      }
      .messages li {
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 4px;
      }
      .success {
        background: #d4edda;
        color: #155724;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
      }
      input {
        padding: 8px;
        width: 300px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      button {
        padding: 10px 20px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #2980b9;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="{% url 'home' %}">Home</a>
      {% if user.is_authenticated %}
      <span style="color: white">Welcome, {{ user.username }}!</span>
      <form method="post" action="{% url 'logout' %}" style="display: inline">
        {% csrf_token %}
        <button
          type="submit"
          style="
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 0;
            margin-left: 10px;
          "
        >
          Logout
        </button>
      </form>
      {% else %}
      <a href="{% url 'login' %}">Login</a>
      <a href="{% url 'signup' %}">Sign Up</a>
      {% endif %}
    </nav>
    <div class="container">
      {% if messages %}
      <ul class="messages">
        {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %} {% block content %} {% endblock %}
    </div>
  </body>
</html>
