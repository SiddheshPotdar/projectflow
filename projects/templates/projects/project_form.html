{% extends 'base.html' %}
{% block title %}Edit Project{% endblock %}
{% block content %}
<h2>Edit Project: {{ project.name }}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-primary">Save Changes</button>
    <a href="{% url 'project_detail' project.pk %}" class="btn-icon">Cancel</a>
</form>
{% endblock %}
