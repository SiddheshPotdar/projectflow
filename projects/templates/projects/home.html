{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block content %}
<h1>Welcome to ProjectFlow</h1>
{% if user.is_authenticated %}
  <p>You are logged in! Your project dashboard will appear here soon.</p>
{% else %}
  <p>Please <a href="{% url 'login' %}">login</a> or <a href="{% url 'signup' %}">sign up</a> to manage your projects.</p>
{% endif %}
{% endblock %}
