{% extends 'base.html' %}
{% block title %}{% if task %}Edit Task{% else %}Add Task{% endif %}{% endblock %}
{% block content %}
<h2>{% if task %}Edit Task{% else %}Add Task to {{ project.name }}{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-primary">Save</button>
    <a href="{% url 'project_detail' project.pk %}" class="btn-icon">Cancel</a>
</form>
{% endblock %}
